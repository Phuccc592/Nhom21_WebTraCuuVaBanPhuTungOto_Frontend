<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Đăng ký - Phụ Tùng Ô Tô</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h2>Đăng Ký Tài Khoản</h2>
        <form id="registerForm">
            <input type="text" id="username" placeholder="Tên đăng nhập" required>
            <input type="email" id="email" placeholder="Email (để nhận OTP)" required>
            <input type="password" id="password" placeholder="Mật khẩu" required>
            <button type="submit">Đăng ký</button>
        </form>
        <p id="message"></p>
    </div>

    <script>
        document.getElementById('registerForm').onsubmit = async (e) => {
            e.preventDefault();
            const data = {
                username: document.getElementById('username').value,
                email: document.getElementById('email').value,
                password: document.getElementById('password').value
            };

            const response = await fetch('http://localhost:8080/api/v1/auth/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });

            if (response.ok) {
                alert("Đăng ký thành công! Vui lòng kiểm tra email để lấy mã OTP.");
                // Chuyển sang trang xác thực, truyền kèm username qua URL
                window.location.href = `verify-otp.html?username=${data.username}`;
            } else {
                document.getElementById('message').innerText = "Đăng ký thất bại. Thử lại!";
            }
        };
    </script>
</body>
</html>
